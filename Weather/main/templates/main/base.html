<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    {% block head %}

    {% endblock %}
</head>
<body>
        <div class="container">
            <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
              <div class="col-md-3 mb-2 mb-md-0">
                <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                  <svg class="bi" width="40" height="32" role="img" aria-label="Bootstrap"><use xlink:href="#bootstrap"></use></svg>
                </a>
              </div>

              <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 link-secondary">Home</a></li>
                <li><a href="{% url 'main:about' %}" class="nav-link px-2">Explore Wether</a></li>
                <li><a href="{% url 'users:dashboard' %}" class="nav-link px-2">Stats</a></li>
              </ul>

              <div class="col-md-3 text-end">
              {% if user.is_authenticated %}
                    <div class="dropdown text-end">
                        <form action="{% url 'logout' %}" method="post" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger">Log out</button>
                        </form>
                    </div>
                {% else %}
                  <button type="button" class="btn btn-outline-primary me-2" onclick="window.location.href='{% url 'users:login' %}'">Login</button>
                  <button type="button" class="btn btn-primary" onclick="window.location.href='{% url 'users:registration' %}'">Sign-up</button>
                {% endif %}
              </div>
            </header>
        </div>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
</body>
</html>
